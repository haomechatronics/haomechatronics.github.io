<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khóa học - Haomechatronics PLC Academy</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* --- GIAO DIỆN MỚI HIỆN ĐẠI --- */
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg-dark: #0f172a;
      --card-bg: rgba(255, 255, 255, 0.95);
      --text-main: #1e293b;
      --accent-green: #10b981;
    }

    body { 
      background: radial-gradient(circle at top right, #1e293b, #0f172a); 
      min-height: 100vh; 
      padding: 40px 0; 
      font-family: 'Inter', system-ui, -apple-system, sans-serif; 
      color: var(--text-main);
      line-height: 1.6;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
    
    /* Card chung */
    .portal-card { 
      background: var(--card-bg); 
      border-radius: 24px; 
      padding: 30px; 
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); 
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* Header Taskbar */
    .header-bar {
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      padding: 20px 30px;
    }

    /* Nút bấm */
    .btn { 
      padding: 12px 24px; 
      border-radius: 12px; 
      cursor: pointer; 
      border: none; 
      font-weight: 700; 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary { background: var(--primary); color: #fff; box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3); }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
    .btn-secondary { background: #f1f5f9; color: #475569; }
    .btn-secondary:hover { background: #e2e8f0; }
    .btn-danger { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; }
    .btn-danger:hover { background: #ef4444; color: white; }
    
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; align-items: start;}
    .admin-only { display: none; }
    
    .form-input { 
      width: 100%; 
      border: 2px solid #e2e8f0; 
      border-radius: 14px; 
      padding: 14px 18px; 
      margin-bottom: 15px; 
      box-sizing: border-box; 
      font-family: inherit; 
      font-size: 15px;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--primary); outline: none; background: #fff; }
    
    /* Progress Bar */
    .course-group-card { 
      background: #ffffff; 
      border: 1px solid #f1f5f9; 
      border-radius: 20px; 
      padding: 25px; 
      margin-bottom: 35px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }
    .course-group-card h3 { 
      margin-top: 0; 
      color: #0f172a; 
      font-size: 20px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 20px;
    }
    
    .progress-container { background: #f1f5f9; border-radius: 50px; height: 12px; overflow: hidden; margin-bottom: 25px; width: 100%; border: 1px solid #e2e8f0; }
    .progress-bar { background: linear-gradient(90deg, #10b981, #34d399); height: 100%; width: 0%; transition: width 0.8s cubic-bezier(0.65, 0, 0.35, 1); }
    .progress-text { font-size: 14px; color: #059669; font-weight: 800; background: #ecfdf5; padding: 4px 12px; border-radius: 12px; border: 1px solid #d1fae5; }

    /* Nội dung bài học */
    .chapter-title { 
      background: #334155; 
      padding: 10px 20px; 
      border-radius: 10px; 
      font-weight: 800; 
      color: #f8fafc; 
      margin: 30px 0 15px 0; 
      font-size: 15px; 
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    details.lesson-details { 
      background: #fff; 
      border: 1px solid #e2e8f0; 
      border-radius: 16px; 
      margin-bottom: 15px; 
      overflow: hidden; 
      transition: all 0.3s;
    }
    details.lesson-details[open] { border-color: var(--primary); box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.1); }

    summary.lesson-summary { 
      padding: 20px 25px; 
      font-weight: 600; 
      cursor: pointer; 
      display: flex; 
      align-items: center; 
      gap: 15px; 
      user-select: none; 
      font-size: 17px; 
      color: #1e293b;
    }
    summary.lesson-summary:hover { background: #f8fafc; }

    .lesson-content { padding: 30px; border-top: 1px solid #f1f5f9; background: #fbfcfd;}
    .lesson-text { white-space: pre-wrap; font-size: 16px; color: #334155; line-height: 1.8; margin-bottom: 25px;}
    
    /* Nút Tải tài liệu */
    .btn-download { 
      display: inline-flex; 
      align-items: center; 
      gap: 10px; 
      background: #f0fdf4; 
      color: #16a34a; 
      padding: 14px 22px; 
      border-radius: 12px; 
      font-weight: 700; 
      text-decoration: none; 
      border: 2px solid #dcfce7; 
      margin-bottom: 20px; 
      transition: all 0.2s;
      font-size: 15px;
    }
    .btn-download:hover { background: #16a34a; color: white; transform: scale(1.02); }

    /* Nút Xem bài học (Thay thế cho YouTube cũ) */
    .btn-view-lesson {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #eff6ff;
      color: #2563eb;
      padding: 14px 22px;
      border-radius: 12px;
      font-weight: 700;
      text-decoration: none;
      font-size: 15px;
      border: 2px solid #dbeafe;
      transition: all 0.2s;
    }
    .btn-view-lesson:hover { background: #2563eb; color: white; }

    .chk-complete { transform: scale(1.5); cursor: pointer; accent-color: #10b981; }
    
    @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } .container { max-width: 100%; } }
  </style>
</head>
<body>

<div class="container" id="lesson-portal" style="display: none;">
  <div class="portal-card header-bar">
    <div>
      <span style="color: var(--primary); font-weight: 900; font-size: 14px; text-transform: uppercase; letter-spacing: 2px;">Haomechatronics Academy</span>
      <h2 style="margin: 5px 0 0 0; font-size: 26px; color: var(--bg-dark);">Hệ Thống Bài Học</h2>
    </div>
    <div style="display: flex; align-items: center; gap: 12px;">
      <div id="portalUserInfo" style="font-size: 14px; color: #64748b; font-weight: 600; background: #f1f5f9; padding: 8px 15px; border-radius: 10px; display: none;"></div>
      <button class="btn btn-secondary" id="portalRefreshBtn">🔄 Làm mới</button>
      <button class="btn btn-primary" id="portalLogoutBtn">Đăng xuất</button>
    </div>
  </div>

  <div class="grid-2 admin-only" style="margin-bottom: 30px;">
    <article class="portal-card">
      <h3 id="formTitle" style="margin-top:0; font-size: 20px; color: var(--bg-dark);">✍️ Soạn thảo bài học</h3>
      <form id="lessonForm">
        <select id="lessonCourseType" class="form-input" required>
          <option value="">Chọn lộ trình khóa học...</option>
          <option value="basic">PLC Cơ bản</option>
          <option value="practical">PLC Ứng dụng thực tế</option>
          <option value="advanced">PLC Nâng cao + HMI</option>
        </select>
        <input type="text" id="lessonChapter" class="form-input" placeholder="Tên Chương" required />
        <input type="text" id="lessonTitle" class="form-input" placeholder="Tiêu đề bài học" required />
        <textarea id="lessonText" class="form-input" placeholder="Nội dung tóm tắt hoặc ghi chú..." style="min-height: 100px;"></textarea>
        <input type="url" id="lessonImg" class="form-input" placeholder="Link tải tài liệu (Không bắt buộc)" />
        <input type="url" id="lessonUrl" class="form-input" placeholder="Link bài học (YouTube/Video)" />
        
        <div style="display: flex; gap: 10px;">
          <button class="btn btn-primary" type="submit" id="submitLessonBtn" style="flex: 1;">Lưu bài học</button>
          <button class="btn btn-secondary" type="button" id="cancelEditBtn" onclick="window.cancelEdit()" style="display: none;">Hủy</button>
        </div>
      </form>
      <p id="lessonFormStatus" style="margin-top: 10px; font-weight: 700; text-align: center;"></p>
    </article>

    <article class="portal-card">
      <h3 style="margin-top:0; font-size: 20px;">👥 Học viên & Quyền hạn</h3>
      <form id="subuserForm" style="background: #f8fafc; padding: 20px; border-radius: 15px; border: 1px dashed #cbd5e1;">
        <input type="email" id="subuserEmail" class="form-input" placeholder="Nhập Gmail học viên..." required />
        <div style="display: flex; gap: 15px; margin: 10px 0;">
          <label><input type="checkbox" id="chk-basic"> Cơ bản</label>
          <label><input type="checkbox" id="chk-practical"> Ứng dụng</label>
          <label><input type="checkbox" id="chk-advanced"> Nâng cao</label>
        </div>
        <button class="btn btn-primary" type="submit" style="width: 100%; justify-content: center;">Cấp quyền</button>
      </form>
      <div id="subuserList" style="margin-top: 20px; max-height: 200px; overflow-y: auto;"></div>
    </article>
  </div>

  <article class="portal-card">
    <h2 style="margin: 0 0 30px 0; font-size: 24px; display: flex; align-items: center; gap: 12px;">
      <span style="background: var(--primary); width: 8px; height: 30px; border-radius: 4px;"></span>
      Lộ Trình Học Tập
    </h2>
    
    <div class="course-group-card" id="group-basic">
      <h3>📘 PLC Cơ bản <span class="progress-text" id="prog-text-basic">0%</span></h3>
      <div class="progress-container"><div class="progress-bar" id="prog-bar-basic"></div></div>
      <div id="list-basic"></div>
    </div>

    <div class="course-group-card" id="group-practical">
      <h3>📙 PLC Ứng dụng thực tế <span class="progress-text" id="prog-text-practical">0%</span></h3>
      <div class="progress-container"><div class="progress-bar" id="prog-bar-practical"></div></div>
      <div id="list-practical"></div>
    </div>

    <div class="course-group-card" id="group-advanced">
      <h3>📕 PLC Nâng cao + HMI <span class="progress-text" id="prog-text-advanced">0%</span></h3>
      <div class="progress-container"><div class="progress-bar" id="prog-bar-advanced"></div></div>
      <div id="list-advanced"></div>
    </div>
  </article>
</div>

<script type="module">
  // --- GIỮ NGUYÊN LOGIC FIREBASE CỦA BẠN ---
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js';
  import { getAuth, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js';
  import { getFirestore, doc, setDoc, getDoc, getDocs, collection, deleteDoc, serverTimestamp, query, orderBy, addDoc, updateDoc, arrayUnion, arrayRemove } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';

  const ADMIN_EMAIL = 'haostudio84l1@gmail.com';
  const firebaseConfig = {
    apiKey: 'AIzaSyDA51Ei3Oe9ipXYjoT857xrqNoU4eZ-4X4',
    authDomain: 'project-81bb7049-bc9f-499f-974.firebaseapp.com',
    projectId: 'project-81bb7049-bc9f-499f-974',
    storageBucket: 'project-81bb7049-bc9f-499f-974.firebasestorage.app',
    messagingSenderId: '533570063852',
    appId: '1:533570063852:web:d15aa61abd7a7c2e64c4c9'
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = window.db = getFirestore(app);

  let currentUser = null;
  let userPermissions = { basic: false, practical: false, advanced: false };
  let completedLessonsData = [];
  let allLessonsData = {};
  let currentEditId = null;

  const portalUserInfo = document.getElementById('portalUserInfo');
  const portalLogoutBtn = document.getElementById('portalLogoutBtn');
  const portalRefreshBtn = document.getElementById('portalRefreshBtn');
  const lessonForm = document.getElementById('lessonForm');
  const subuserForm = document.getElementById('subuserForm');

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "login.html"; return; }
    if (user.email !== ADMIN_EMAIL) {
      const docRef = doc(db, 'allowedUsers', user.email);
      const docSnap = await getDoc(docRef);
      if (!docSnap.exists()) {
        alert("Chưa được cấp quyền!");
        signOut(auth).then(() => { window.location.href = "index.html"; });
        return;
      }
      const data = docSnap.data();
      userPermissions = { basic: !!data.basic, practical: !!data.practical, advanced: !!data.advanced };
    } else {
      userPermissions = { basic: true, practical: true, advanced: true };
    }
    document.getElementById('lesson-portal').style.display = 'block';
    currentUser = user;
    portalUserInfo.innerText = user.email;
    portalUserInfo.style.display = 'block';
    if (user.email === ADMIN_EMAIL) {
      document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'grid'); 
      loadSubusers();
    }
    loadLessons();
  });

  async function loadLessons() {
    try {
      document.getElementById('group-basic').style.display = userPermissions.basic ? 'block' : 'none';
      document.getElementById('group-practical').style.display = userPermissions.practical ? 'block' : 'none';
      document.getElementById('group-advanced').style.display = userPermissions.advanced ? 'block' : 'none';

      const progressRef = doc(db, 'userProgress', currentUser.email);
      const progressSnap = await getDoc(progressRef);
      if (progressSnap.exists()) completedLessonsData = progressSnap.data().completed || [];

      const q = query(collection(db, "youtubeLinks"), orderBy("createdAt", "asc"));
      const querySnapshot = await getDocs(q);
      allLessonsData = {};
      let coursesData = { basic: { total: 0, done: 0, chapters: {} }, practical: { total: 0, done: 0, chapters: {} }, advanced: { total: 0, done: 0, chapters: {} } };

      querySnapshot.forEach((docSnap) => {
        const data = docSnap.data();
        const docId = docSnap.id;
        allLessonsData[docId] = data;
        const type = data.type;
        const chapterName = data.chapter || "Tổng quan";
        if (coursesData[type]) {
          coursesData[type].total++;
          const isCompleted = completedLessonsData.includes(docId);
          if (isCompleted) coursesData[type].done++;
          if (!coursesData[type].chapters[chapterName]) coursesData[type].chapters[chapterName] = [];
          coursesData[type].chapters[chapterName].push({ id: docId, ...data, isCompleted });
        }
      });

      ['basic', 'practical', 'advanced'].forEach(type => {
        const container = document.getElementById(`list-${type}`);
        let html = '';
        for (const [chapterName, lessons] of Object.entries(coursesData[type].chapters)) {
          html += `<div class="chapter-title">${chapterName}</div>`;
          lessons.forEach(lesson => {
            const checkedAttr = lesson.isCompleted ? "checked" : "";
            const adminBtns = (currentUser.email === ADMIN_EMAIL) ? `
                 <div style="margin-top:20px; display: flex; gap: 10px;">
                    <button class="btn btn-secondary" onclick="window.editLesson('${lesson.id}')" style="font-size:13px;">✏️ Sửa</button>
                    <button class="btn btn-danger" onclick="window.deleteLesson('${lesson.id}')" style="font-size:13px; padding:6px 12px;">Xóa</button>
                 </div>` : '';
            
            const textHtml = lesson.text ? `<div class="lesson-text">${lesson.text}</div>` : '';
            const downloadHtml = lesson.imgUrl ? `<a href="${lesson.imgUrl}" target="_blank" class="btn-download">📂 Tài liệu đính kèm</a>` : '';
            
            // ĐỔI TÊN NÚT TẠI ĐÂY
            const vidHtml = lesson.url ? `<div style="margin-top:10px;"><a href="${lesson.url}" target="_blank" class="btn-view-lesson">🚀 Xem bài học</a></div>` : '';

            html += `
              <details class="lesson-details">
                <summary class="lesson-summary">
                  <input type="checkbox" class="chk-complete" onchange="window.toggleComplete('${lesson.id}', this.checked)" ${checkedAttr} />
                  <span>${lesson.title}</span>
                </summary>
                <div class="lesson-content">
                  ${textHtml}
                  ${downloadHtml}
                  ${vidHtml}
                  ${adminBtns}
                </div>
              </details>`;
          });
        }
        container.innerHTML = html || '<p>Chưa có bài học.</p>';
        const percent = coursesData[type].total === 0 ? 0 : Math.round((coursesData[type].done / coursesData[type].total) * 100);
        document.getElementById(`prog-bar-${type}`).style.width = `${percent}%`;
        document.getElementById(`prog-text-${type}`).innerText = `${percent}%`;
      });
    } catch (e) { console.error(e); }
  }

  // --- CÁC HÀM CÒN LẠI GIỮ NGUYÊN ---
  window.toggleComplete = async (lessonId, isChecked) => {
    const progressRef = doc(db, 'userProgress', currentUser.email);
    if (isChecked) {
      await setDoc(progressRef, { completed: arrayUnion(lessonId) }, { merge: true });
      completedLessonsData.push(lessonId);
    } else {
      await setDoc(progressRef, { completed: arrayRemove(lessonId) }, { merge: true });
      completedLessonsData = completedLessonsData.filter(id => id !== lessonId);
    }
    loadLessons(); 
  };

  window.editLesson = (lessonId) => {
    const data = allLessonsData[lessonId];
    document.getElementById('lessonCourseType').value = data.type;
    document.getElementById('lessonChapter').value = data.chapter || "";
    document.getElementById('lessonTitle').value = data.title || "";
    document.getElementById('lessonText').value = data.text || "";
    document.getElementById('lessonImg').value = data.imgUrl || "";
    document.getElementById('lessonUrl').value = data.url || "";
    currentEditId = lessonId;
    document.getElementById('formTitle').innerText = "✏️ Sửa bài học";
    document.getElementById('submitLessonBtn').innerText = "Cập nhật";
    document.getElementById('cancelEditBtn').style.display = "block";
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.cancelEdit = () => {
    currentEditId = null; lessonForm.reset();
    document.getElementById('formTitle').innerText = "✍️ Soạn thảo bài học";
    document.getElementById('submitLessonBtn').innerText = "Lưu bài học";
    document.getElementById('cancelEditBtn').style.display = "none";
  };

  lessonForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const lessonData = {
      type: document.getElementById('lessonCourseType').value,
      chapter: document.getElementById('lessonChapter').value,
      title: document.getElementById('lessonTitle').value,
      text: document.getElementById('lessonText').value,
      imgUrl: document.getElementById('lessonImg').value,
      url: document.getElementById('lessonUrl').value,
    };
    if (currentEditId) {
      await updateDoc(doc(db, "youtubeLinks", currentEditId), lessonData);
      window.cancelEdit();
    } else {
      lessonData.createdAt = serverTimestamp();
      await addDoc(collection(db, "youtubeLinks"), lessonData);
      lessonForm.reset();
    }
    loadLessons();
  });

  async function loadSubusers() {
    const querySnapshot = await getDocs(collection(db, "allowedUsers"));
    let html = '';
    querySnapshot.forEach((docSnap) => {
      html += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;">
        <span>${docSnap.id}</span>
        <button class="btn-danger" onclick="window.deleteUser('${docSnap.id}')">Xóa</button>
      </div>`;
    });
    document.getElementById('subuserList').innerHTML = html;
  }

  subuserForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('subuserEmail').value;
    await setDoc(doc(db, "allowedUsers", email), {
      addedAt: serverTimestamp(),
      basic: document.getElementById('chk-basic').checked,
      practical: document.getElementById('chk-practical').checked,
      advanced: document.getElementById('chk-advanced').checked
    });
    subuserForm.reset(); loadSubusers();
  });

  window.deleteLesson = async (id) => { if(confirm("Xóa bài học?")) { await deleteDoc(doc(db, "youtubeLinks", id)); loadLessons(); } };
  window.deleteUser = async (email) => { if(confirm("Xóa học viên?")) { await deleteDoc(doc(db, "allowedUsers", email)); loadSubusers(); } };

  portalRefreshBtn.addEventListener('click', loadLessons);
  portalLogoutBtn.addEventListener('click', () => signOut(auth).then(() => { window.location.href = "index.html"; }));
</script>
</body>
</html>
