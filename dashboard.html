<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khóa học - Haomechatronics</title>
    <title>Haomechatronics PLC Academy</title>
  <link rel="icon" type="image/jpeg" href="Images/logo.jpg" />
  <link rel="shortcut icon" href="Images/logo.jpg" />
  <link rel="apple-touch-icon" href="Images/logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: linear-gradient(120deg, #07111f 0%, #0a1a34 60%, #07111f 100%); min-height: 100vh; padding: 40px 0; font-family: 'Inter', sans-serif; color: #333;}
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    .portal-card { background: #ffffff; border-radius: 20px; padding: 24px; box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06); margin-bottom: 24px;}
    .btn { padding: 10px 20px; border-radius: 8px; cursor: pointer; border: none; font-weight: 600;}
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-secondary { background: #e2e8f0; color: #1e293b; }
    .btn-danger { background: #ef4444; color: white; padding: 6px 12px; font-size: 13px; border-radius: 6px; }
    .grid-2 { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 24px; align-items: start;}
    .admin-only { display: none; }
    
    .form-input { width: 100%; border: 1px solid #dbe2ea; border-radius: 12px; padding: 12px 16px; margin-bottom: 12px; box-sizing: border-box; font-family: inherit;}
    .course-group-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 16px; margin-bottom: 16px;}
    .course-group-card h3 { margin-top: 0; color: #0f172a; font-size: 18px; display: flex; justify-content: space-between; align-items: center;}
    
    /* CSS cho Thanh tiến trình */
    .progress-container { background: #e2e8f0; border-radius: 999px; height: 12px; overflow: hidden; margin-bottom: 16px; width: 100%;}
    .progress-bar { background: #16a34a; height: 100%; width: 0%; transition: width 0.5s ease-in-out; }
    .progress-text { font-size: 14px; color: #475569; font-weight: 600;}

    /* CSS cho Accordion (Sổ xuống) và Chương */
    .chapter-title { background: #e2e8f0; padding: 8px 12px; border-radius: 6px; font-weight: 700; color: #1e293b; margin: 16px 0 10px 0; font-size: 15px;}
    details.lesson-details { background: #fff; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 8px; overflow: hidden; transition: all 0.3s;}
    summary.lesson-summary { padding: 14px 16px; font-weight: 600; cursor: pointer; background: #fff; display: flex; align-items: center; gap: 12px; user-select: none; font-size: 15px;}
    summary.lesson-summary:hover { background: #f8fafc; }
    .lesson-content { padding: 16px; border-top: 1px solid #e2e8f0; background: #fafafa;}
    .lesson-text { white-space: pre-wrap; font-size: 14px; color: #334155; line-height: 1.6; margin-bottom: 12px;}
    .lesson-img { max-width: 100%; border-radius: 8px; margin-bottom: 12px; border: 1px solid #e2e8f0;}
    
    .chk-complete { transform: scale(1.3); cursor: pointer; accent-color: #16a34a; }
    
    @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="container" id="lesson-portal" style="display: none;">
  <div style="display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 20px 24px; border-radius: 20px; margin-bottom: 24px;">
    <div>
      <span style="color: #2563eb; font-weight: 700; font-size: 14px; text-transform: uppercase;">Haomechatronics Academy</span>
      <h2 style="margin: 5px 0 0 0;">Khu vực bài học</h2>
    </div>
    <div style="display: flex; gap: 10px;">
      <button class="btn btn-secondary" id="portalRefreshBtn">Tải lại</button>
      <button class="btn btn-primary" id="portalLogoutBtn">Đăng xuất</button>
    </div>
  </div>

  <div class="grid-2">
    <div>
      <article class="portal-card admin-only" id="addLessonCard">
        <h3 style="margin-top:0;">Đăng tải bài học mới</h3>
        <form id="lessonForm">
          <select id="lessonCourseType" class="form-input" required>
            <option value="">Chọn lộ trình khóa học...</option>
            <option value="basic">PLC Cơ bản</option>
            <option value="practical">PLC Ứng dụng thực tế</option>
            <option value="advanced">PLC Nâng cao + HMI</option>
          </select>
          <input type="text" id="lessonChapter" class="form-input" placeholder="Tên Chương (VD: Chương 1: Tổng quan)" required />
          <input type="text" id="lessonTitle" class="form-input" placeholder="Tiêu đề bài học (VD: Bài 1: Cấu tạo PLC)" required />
          <textarea id="lessonText" class="form-input" placeholder="Nội dung chữ (Ghi chú, giải thích...)" style="min-height: 100px;"></textarea>
          <input type="url" id="lessonImg" class="form-input" placeholder="Link hình ảnh (Không bắt buộc)" />
          <input type="url" id="lessonUrl" class="form-input" placeholder="Link YouTube (Không bắt buộc)" />
          
          <button class="btn btn-primary" type="submit" style="width: 100%;">Lưu bài học</button>
        </form>
        <p id="lessonFormStatus" style="color: #16a34a; margin-top: 10px; font-weight: 500;"></p>
      </article>

      <article class="portal-card">
        <h3 style="margin-top:0; margin-bottom: 20px;">Lộ trình học tập của bạn</h3>
        
        <div class="course-group-card" id="group-basic">
          <h3>📘 PLC Cơ bản <span class="progress-text" id="prog-text-basic">0%</span></h3>
          <div class="progress-container"><div class="progress-bar" id="prog-bar-basic"></div></div>
          <div id="list-basic"></div>
        </div>

        <div class="course-group-card" id="group-practical">
          <h3>📙 PLC Ứng dụng thực tế <span class="progress-text" id="prog-text-practical">0%</span></h3>
          <div class="progress-container"><div class="progress-bar" id="prog-bar-practical"></div></div>
          <div id="list-practical"></div>
        </div>

        <div class="course-group-card" id="group-advanced">
          <h3>📕 PLC Nâng cao + HMI <span class="progress-text" id="prog-text-advanced">0%</span></h3>
          <div class="progress-container"><div class="progress-bar" id="prog-bar-advanced"></div></div>
          <div id="list-advanced"></div>
        </div>
      </article>
    </div>

    <div>
      <article class="portal-card">
        <h3 style="margin-top:0;">Tài khoản của bạn</h3>
        <p id="portalUserInfo" style="background: #f1f5f9; padding: 12px; border-radius: 8px; font-weight: 600; color: #334155; word-break: break-all;">Đang kiểm tra...</p>
      </article>

      <article class="portal-card admin-only" id="adminPanel">
        <h3 style="margin-top:0;">Admin: Cấp quyền Học viên</h3>
        <p style="color: #64748b; font-size: 14px; margin-bottom: 12px;">Nhập Email và chọn các khóa học muốn cấp quyền.</p>
        
        <form id="subuserForm" style="display: flex; flex-direction: column; gap: 12px;">
          <input type="email" id="subuserEmail" class="form-input" style="margin-bottom:0;" placeholder="hocvien@gmail.com" required />
          
          <div style="display: flex; flex-wrap: wrap; gap: 12px; font-size: 14px; color: #334155; font-weight: 500;">
            <label style="cursor: pointer;"><input type="checkbox" id="chk-basic"> Cơ bản</label>
            <label style="cursor: pointer;"><input type="checkbox" id="chk-practical"> Ứng dụng</label>
            <label style="cursor: pointer;"><input type="checkbox" id="chk-advanced"> Nâng cao</label>
          </div>

          <button class="btn btn-primary" type="submit">Cấp quyền khóa học</button>
        </form>
        <p id="subuserStatus" style="margin-top: 10px; font-weight: 500; font-size: 14px;"></p>
        
        <h4 style="margin: 20px 0 10px 0;">Danh sách đã cấp quyền:</h4>
        <div id="subuserList" style="display: grid; gap: 8px;"></div>
      </article>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js';
  import { getAuth, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js';
  import { getFirestore, doc, setDoc, getDoc, getDocs, collection, deleteDoc, serverTimestamp, query, orderBy, addDoc, arrayUnion, arrayRemove } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';

  const ADMIN_EMAIL = 'haostudio84l1@gmail.com';

  const firebaseConfig = {
    apiKey: 'AIzaSyDA51Ei3Oe9ipXYjoT857xrqNoU4eZ-4X4',
    authDomain: 'project-81bb7049-bc9f-499f-974.firebaseapp.com',
    projectId: 'project-81bb7049-bc9f-499f-974',
    storageBucket: 'project-81bb7049-bc9f-499f-974.firebasestorage.app',
    messagingSenderId: '533570063852',
    appId: '1:533570063852:web:d15aa61abd7a7c2e64c4c9'
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = window.db = getFirestore(app);

  let currentUser = null;
  let userPermissions = { basic: false, practical: false, advanced: false };
  let completedLessonsData = [];

  const portalUserInfo = document.getElementById('portalUserInfo');
  const portalLogoutBtn = document.getElementById('portalLogoutBtn');
  const portalRefreshBtn = document.getElementById('portalRefreshBtn');
  const lessonForm = document.getElementById('lessonForm');
  const subuserForm = document.getElementById('subuserForm');

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "login.html"; return; }
    
    if (user.email !== ADMIN_EMAIL) {
      const docRef = doc(db, 'allowedUsers', user.email);
      const docSnap = await getDoc(docRef);
      if (!docSnap.exists()) {
        alert("Tài khoản chưa được Admin cấp quyền!");
        signOut(auth).then(() => { window.location.href = "index.html"; });
        return;
      }
      const data = docSnap.data();
      userPermissions.basic = !!data.basic;
      userPermissions.practical = !!data.practical;
      userPermissions.advanced = !!data.advanced;
    } else {
      userPermissions = { basic: true, practical: true, advanced: true };
    }

    document.getElementById('lesson-portal').style.display = 'block';
    currentUser = user;
    portalUserInfo.innerText = user.email;

    if (user.email === ADMIN_EMAIL) {
      document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
      loadSubusers();
    }

    loadLessons();
  });

  async function loadLessons() {
    try {
      document.getElementById('group-basic').style.display = userPermissions.basic ? 'block' : 'none';
      document.getElementById('group-practical').style.display = userPermissions.practical ? 'block' : 'none';
      document.getElementById('group-advanced').style.display = userPermissions.advanced ? 'block' : 'none';

      // 1. Lấy dữ liệu bài đã học của user
      const progressRef = doc(db, 'userProgress', currentUser.email);
      const progressSnap = await getDoc(progressRef);
      if (progressSnap.exists()) {
        completedLessonsData = progressSnap.data().completed || [];
      }

      // 2. Lấy dữ liệu toàn bộ bài học
      const q = query(collection(db, "youtubeLinks"), orderBy("createdAt", "asc"));
      const querySnapshot = await getDocs(q);
      
      // Biến nhóm dữ liệu theo Cấp độ -> Chương
      let coursesData = {
        basic: { total: 0, done: 0, chapters: {} },
        practical: { total: 0, done: 0, chapters: {} },
        advanced: { total: 0, done: 0, chapters: {} }
      };

      querySnapshot.forEach((docSnap) => {
        const data = docSnap.data();
        const docId = docSnap.id;
        const type = data.type;
        const chapterName = data.chapter || "Chưa phân chương";
        
        if (coursesData[type]) {
          coursesData[type].total++;
          const isCompleted = completedLessonsData.includes(docId);
          if (isCompleted) coursesData[type].done++;

          if (!coursesData[type].chapters[chapterName]) {
            coursesData[type].chapters[chapterName] = [];
          }
          
          coursesData[type].chapters[chapterName].push({ id: docId, ...data, isCompleted });
        }
      });

      // 3. Render HTML và Cập nhật thanh tiến trình
      ['basic', 'practical', 'advanced'].forEach(type => {
        const container = document.getElementById(`list-${type}`);
        let html = '';
        
        // Vẽ nội dung theo từng chương
        for (const [chapterName, lessons] of Object.entries(coursesData[type].chapters)) {
          html += `<div class="chapter-title">${chapterName}</div>`;
          
          lessons.forEach(lesson => {
            const checkedAttr = lesson.isCompleted ? "checked" : "";
            const adminDelBtn = (currentUser.email === ADMIN_EMAIL) 
              ? `<button class="btn-danger" onclick="window.deleteLesson('${lesson.id}')" style="margin-top:10px;">Xóa bài này</button>` : '';
            
            const textHtml = lesson.text ? `<div class="lesson-text">${lesson.text}</div>` : '';
            const imgHtml = lesson.imgUrl ? `<img src="${lesson.imgUrl}" class="lesson-img" />` : '';
            const vidHtml = lesson.url ? `<div style="margin-top:10px;"><a href="${lesson.url}" target="_blank" style="color:#2563eb; font-weight:600;">📺 Xem Video Bài Học</a></div>` : '';

            html += `
              <details class="lesson-details">
                <summary class="lesson-summary">
                  <input type="checkbox" class="chk-complete" onchange="window.toggleComplete('${lesson.id}', this.checked)" ${checkedAttr} title="Đánh dấu hoàn thành" />
                  <span>${lesson.title}</span>
                </summary>
                <div class="lesson-content">
                  ${textHtml}
                  ${imgHtml}
                  ${vidHtml}
                  ${adminDelBtn}
                </div>
              </details>
            `;
          });
        }
        
        container.innerHTML = html || '<p style="color:#64748b; font-size: 14px;">Chưa có bài học.</p>';

        // Cập nhật Progress Bar
        const percent = coursesData[type].total === 0 ? 0 : Math.round((coursesData[type].done / coursesData[type].total) * 100);
        document.getElementById(`prog-bar-${type}`).style.width = `${percent}%`;
        document.getElementById(`prog-text-${type}`).innerText = `${percent}%`;
      });

    } catch (error) { console.error("Lỗi tải bài học:", error); }
  }

  // HÀM: Học viên tick chọn hoàn thành bài học
  window.toggleComplete = async (lessonId, isChecked) => {
    try {
      const progressRef = doc(db, 'userProgress', currentUser.email);
      if (isChecked) {
        await setDoc(progressRef, { completed: arrayUnion(lessonId) }, { merge: true });
        completedLessonsData.push(lessonId);
      } else {
        await setDoc(progressRef, { completed: arrayRemove(lessonId) }, { merge: true });
        completedLessonsData = completedLessonsData.filter(id => id !== lessonId);
      }
      loadLessons(); // Tải lại để tính lại %
    } catch (error) {
      console.error("Lỗi lưu tiến trình:", error);
      alert("Không thể lưu tiến trình. Hãy báo Admin kiểm tra Database Rules.");
    }
  };

  // ADMIN: THÊM BÀI HỌC CÓ CHƯƠNG, TEXT, ẢNH
  lessonForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const statusText = document.getElementById('lessonFormStatus');
    try {
      statusText.innerText = "Đang lưu...";
      await addDoc(collection(db, "youtubeLinks"), {
        type: document.getElementById('lessonCourseType').value,
        chapter: document.getElementById('lessonChapter').value,
        title: document.getElementById('lessonTitle').value,
        text: document.getElementById('lessonText').value,
        imgUrl: document.getElementById('lessonImg').value,
        url: document.getElementById('lessonUrl').value,
        createdAt: serverTimestamp()
      });
      statusText.innerText = "Lưu thành công!";
      lessonForm.reset();
      loadLessons();
      setTimeout(() => { statusText.innerText = ""; }, 3000);
    } catch (error) {
      statusText.style.color = "red";
      statusText.innerText = "Lỗi: " + error.message;
    }
  });

  // ADMIN: CÁC HÀM CŨ GIỮ NGUYÊN
  async function loadSubusers() {
    const listDiv = document.getElementById('subuserList');
    try {
      const querySnapshot = await getDocs(collection(db, "allowedUsers"));
      let html = '';
      querySnapshot.forEach((docSnap) => {
        const d = docSnap.data();
        let perms = [];
        if(d.basic) perms.push('Cơ bản');
        if(d.practical) perms.push('Ứng dụng');
        if(d.advanced) perms.push('Nâng cao');
        html += `
          <div style="display: flex; justify-content: space-between; align-items: center; background: #f1f5f9; padding: 10px; border-radius: 8px;">
            <div>
              <span style="font-size: 14px; font-weight: 600; display: block;">${docSnap.id}</span>
              <span style="font-size: 12px; color: #16a34a; font-weight: 500;">Khóa: ${perms.length > 0 ? perms.join(' | ') : 'Chưa chọn'}</span>
            </div>
            <button class="btn-danger" onclick="window.deleteUser('${docSnap.id}')" style="border:none; cursor:pointer;">Xóa</button>
          </div>`;
      });
      listDiv.innerHTML = html || '<p style="color:#64748b; font-size: 14px;">Chưa có tài khoản nào.</p>';
    } catch (error) { console.error("Lỗi:", error); }
  }

  subuserForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('subuserEmail').value.trim();
    const statusText = document.getElementById('subuserStatus');
    try {
      await setDoc(doc(db, "allowedUsers", email), {
        addedAt: serverTimestamp(),
        basic: document.getElementById('chk-basic').checked,
        practical: document.getElementById('chk-practical').checked,
        advanced: document.getElementById('chk-advanced').checked
      });
      statusText.style.color = "#16a34a";
      statusText.innerText = "Cập nhật thành công!";
      subuserForm.reset();
      loadSubusers();
      setTimeout(() => { statusText.innerText = ""; }, 3000);
    } catch (error) { statusText.style.color = "red"; statusText.innerText = "Lỗi: " + error.message; }
  });

  window.deleteLesson = async (docId) => {
    if(confirm("Bạn có chắc muốn xóa bài học này?")) {
      await deleteDoc(doc(db, "youtubeLinks", docId));
      loadLessons();
    }
  };

  window.deleteUser = async (email) => {
    if(confirm(`Thu hồi toàn bộ quyền của ${email}?`)) {
      await deleteDoc(doc(db, "allowedUsers", email));
      loadSubusers();
    }
  };

  portalRefreshBtn.addEventListener('click', loadLessons);
  portalLogoutBtn.addEventListener('click', () => signOut(auth).then(() => { window.location.href = "index.html"; }));
</script>
</body>
</html>
