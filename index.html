<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js';
  import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    signOut,
    onAuthStateChanged
  } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js';
  import {
    getFirestore,
    doc,
    setDoc,
    getDoc,
    getDocs,
    deleteDoc,
    addDoc,
    collection,
    query,
    where,
    onSnapshot,
    orderBy,
    serverTimestamp
  } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';

  // --- CẤU HÌNH ---
  const ADMIN_EMAIL = 'haostudio84l1@gmail.com';
  const firebaseConfig = {
    apiKey: 'AIzaSyDA51Ei3Oe9ipXYjoT857xrqNoU4eZ-4X4',
    authDomain: 'project-81bb7049-bc9f-499f-974.firebaseapp.com',
    projectId: 'project-81bb7049-bc9f-499f-974',
    storageBucket: 'project-81bb7049-bc9f-499f-974.firebasestorage.app',
    messagingSenderId: '533570063852',
    appId: '1:533570063852:web:d15aa61abd7a7c2e64c4c9'
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  // --- DOM ELEMENTS ---
  const elements = {
    loginBtn: document.getElementById('googleLoginBtn'),
    logoutBtn: document.getElementById('googleLogoutBtn'),
    portalLogoutBtn: document.getElementById('portalLogoutBtn'),
    openPortalBtn: document.getElementById('openPortalBtn'),
    status: document.getElementById('authStatus'),
    error: document.getElementById('authError'),
    portalSection: document.getElementById('lesson-portal'),
    portalContent: document.getElementById('portalContent'),
    portalGate: document.getElementById('portalGateCard'),
    adminPanels: document.querySelectorAll('.admin-only'),
    lessonForm: document.getElementById('lessonForm'),
    subuserForm: document.getElementById('subuserForm'),
    userInfo: document.getElementById('portalUserInfo'),
    lists: {
      basic: document.getElementById('lessonListBasic'),
      practical: document.getElementById('lessonListPractical'),
      advanced: document.getElementById('lessonListAdvanced'),
      users: document.getElementById('subuserList')
    }
  };

  // --- LOGIC XỬ LÝ CHÍNH ---

  // 1. Đăng nhập / Đăng xuất
  elements.loginBtn.onclick = () => signInWithPopup(auth, provider).catch(err => elements.error.innerText = err.message);
  
  const logoutAction = () => {
    signOut(auth).then(() => {
      window.location.hash = "#home";
      location.reload();
    });
  };
  elements.logoutBtn.onclick = logoutAction;
  elements.portalLogoutBtn.onclick = logoutAction;

  // 2. Theo dõi trạng thái đăng nhập
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const isAdmin = user.email === ADMIN_EMAIL;
      elements.status.innerHTML = `Đang đăng nhập: <strong>${user.email}</strong> ${isAdmin ? '(Admin)' : ''}`;
      elements.userInfo.innerText = `Email: ${user.email} | Quyền: ${isAdmin ? 'Quản trị viên' : 'Học viên'}`;
      
      // Kiểm tra quyền truy cập Firestore
      const userRef = doc(db, "allowedUsers", user.email);
      const userSnap = await getDoc(userRef);

      if (isAdmin || userSnap.exists()) {
        showPortal(isAdmin);
      } else {
        elements.error.innerText = "Tài khoản của bạn chưa được cấp quyền truy cập bài học.";
      }
    } else {
      elements.status.innerText = "Chưa đăng nhập.";
      elements.portalSection.hidden = true;
    }
  });

  // 3. Hiển thị Portal
  function showPortal(isAdmin) {
    elements.portalSection.hidden = false;
    elements.portalGate.hidden = true;
    elements.portalContent.hidden = false;
    document.body.classList.add('portal-mode');

    // Ẩn/Hiện tính năng Admin
    elements.adminPanels.forEach(p => p.hidden = !isAdmin);

    loadLessons();
    if (isAdmin) loadSubusers();
  }

  // 4. Quản lý Bài học (CRUD)
  elements.lessonForm.onsubmit = async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.disabled = true;

    try {
      await addDoc(collection(db, "youtubeLinks"), {
        type: document.getElementById('lessonCourseType').value,
        title: document.getElementById('lessonTitle').value,
        url: document.getElementById('lessonUrl').value,
        desc: document.getElementById('lessonDescription').value,
        createdAt: serverTimestamp()
      });
      elements.lessonForm.reset();
      alert("Đã thêm bài học thành công!");
    } catch (err) { alert("Lỗi: " + err.message); }
    btn.disabled = false;
  };

  function loadLessons() {
    const q = query(collection(db, "youtubeLinks"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snapshot) => {
      // Clear lists
      Object.values(elements.lists).forEach(list => { if(list.id !== 'subuserList') list.innerHTML = ''; });

      snapshot.forEach((doc) => {
        const data = doc.data();
        const isAdmin = auth.currentUser?.email === ADMIN_EMAIL;
        const item = document.createElement('div');
        item.className = 'lesson-card';
        item.innerHTML = `
          <h4>${data.title}</h4>
          <p>${data.desc || ''}</p>
          <a class="youtube-link" href="${data.url}" target="_blank">📺 Xem video bài giảng</a>
          ${isAdmin ? `<br><button class="btn btn-secondary" style="margin-top:10px; padding:5px 10px; font-size:12px; color:red;" onclick="window.deleteLesson('${doc.id}')">Xóa bài</button>` : ''}
        `;
        
        const targetList = elements.lists[data.type];
        if (targetList) targetList.appendChild(item);
      });
      
      // Kiểm tra nếu trống
      ['basic', 'practical', 'advanced'].forEach(type => {
        if (!elements.lists[type].innerHTML) elements.lists[type].innerHTML = '<div class="empty-state">Chưa có bài học nào.</div>';
      });
    });
  }

  // 5. Quản lý Tài khoản con (Admin only)
  elements.subuserForm.onsubmit = async (e) => {
    e.preventDefault();
    const email = document.getElementById('subuserEmail').value.toLowerCase().trim();
    try {
      await setDoc(doc(db, "allowedUsers", email), { email, addedAt: serverTimestamp() });
      elements.subuserForm.reset();
      alert("Đã cấp quyền cho: " + email);
    } catch (err) { alert("Lỗi: " + err.message); }
  };

  function loadSubusers() {
    onSnapshot(collection(db, "allowedUsers"), (snapshot) => {
      elements.lists.users.innerHTML = '';
      snapshot.forEach((doc) => {
        const div = document.createElement('div');
        div.className = 'subuser-card';
        div.innerHTML = `
          <span>${doc.id}</span>
          <button class="btn" style="color:red; background:none; border:none; cursor:pointer;" onclick="window.deleteUser('${doc.id}')">Thu hồi quyền</button>
        `;
        elements.lists.users.appendChild(div);
      });
    });
  }

  // Gán hàm vào window để dùng trong HTML động
  window.deleteLesson = (id) => confirm("Xóa bài học này?") && deleteDoc(doc(db, "youtubeLinks", id));
  window.deleteUser = (email) => confirm("Thu hồi quyền của " + email + "?") && deleteDoc(doc(db, "allowedUsers", email));
  
  // Nút mở Portal thủ công
  elements.openPortalBtn.onclick = () => {
    if (auth.currentUser) {
        document.body.classList.add('portal-mode');
        elements.portalSection.hidden = false;
        window.scrollTo(0,0);
    } else {
        alert("Vui lòng đăng nhập trước!");
    }
  };

</script>
